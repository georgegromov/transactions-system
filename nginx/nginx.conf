worker_processes auto;

events {
    # Сколько одновременных соединений может держать один worker.
    # Если ядер 4, то 4 * 1024 = 4096 одновременных подключений.
    worker_connections 1024;
}

http {

		# Конфигурация HTTP
		include mime.types;
		default_type application/json;

		sendfile on;
		tcp_nopush on;
		tcp_nodelay on;

		keepalive_timeout 65;
		types_hash_max_size 2048;

		# Логирование
		access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

		# Upstream для балансировки нагрузки между сервисами
    upstream transaction_processor {
        server transaction-processor:8081;
    }

    upstream balance_viewer {
        server balance-viewer:8084;
    }


		server {
			listen 80;
			server_name localhost;

			error_page 404 /custom_404;
			error_page 405 /custom_405;

			location /custom_404 {
				return 404 '{
				"status":"not_found", 
				"service":"api-gateway", 
				"message": "The requested endpoint does not exist."
				}';
				add_header Content-Type application/json;
			}

			location /custom_405 {
				return 405 '{
				"status":"method_not_allowed", 
				"service":"api-gateway", 
				"message": "HTTP method is not supported for this endpoint."
				}';
				add_header Content-Type application/json;
			}

			location = / {
            return 301 /health;
			}

			location = /health {
            return 200 '{"status":"ok", "service":"api-gateway"}';
            add_header Content-Type application/json;
			}

			# Роутинг для транзакций (POST /api/v1/transactions)
			location /api/v1/transactions {
            proxy_pass http://transaction_processor;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
			}

			# Роутинг для балансов (GET /api/v1/balances/{account_id})
			location /api/v1/balances {
            proxy_pass http://balance_viewer;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
			}
		}
}